<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 정수를 위한 새김</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
/* ── 테마 변수 ────────────────────────────── */
:root {
  --cell-w: 40px;
  --cell-h: 42.8px;
  --margin: 1cm;
}
[data-theme="dark"] {
  --bg:        #1a1108;      /* 어두운 나무 */
  --line:      rgba(255,255,255,0.18);
  --stone:     #f0ede8;      /* 흰 돌 */
  --stone-sh:  rgba(0,0,0,.55);
  --stone-hl:  rgba(255,255,255,.7);
  --ui-bg:     rgba(15,12,6,.78);
  --ui-border: rgba(255,255,255,.12);
  --ui-text:   #e8e4dc;
  --ui-sub:    rgba(232,228,220,.45);
  --ui-muted:  rgba(232,228,220,.2);
  --compose-bg:rgba(10,8,4,.6);
  --btn-bg:    #f0ede8;
  --btn-icon:  #1a1108;
  --btn-dis:   rgba(255,255,255,.12);
  --del-hover: rgba(226,75,74,.18);
  --card-bg:   rgba(10,8,4,.55);
  --card-border:rgba(255,255,255,.1);
  --related-bg: rgba(10,8,4,.7);
  --related-border: rgba(255,255,255,.15);
  --related-txt: rgba(232,228,220,.7);
  --related-kw:  #c8b97a;
  --dialog-bg:  #f5f2ec;
  --dialog-text:#1a1108;
  --dialog-sub: #5a5040;
  --dialog-cancel-bg: #e0dbd0;
  --dialog-cancel-c:  #3a3020;
  --toggle-icon: ☀️;
}
[data-theme="light"] {
  --bg:        #f5f0e8;
  --line:      rgba(30,20,5,.25);
  --stone:     #1a1208;      /* 검은 돌 */
  --stone-sh:  rgba(0,0,0,.35);
  --stone-hl:  rgba(255,255,255,.25);
  --ui-bg:     rgba(245,240,232,.85);
  --ui-border: rgba(30,20,5,.15);
  --ui-text:   #1a1208;
  --ui-sub:    rgba(30,20,5,.5);
  --ui-muted:  rgba(30,20,5,.2);
  --compose-bg:rgba(255,252,245,.75);
  --btn-bg:    #1a1208;
  --btn-icon:  #f5f0e8;
  --btn-dis:   rgba(30,20,5,.15);
  --del-hover: rgba(226,75,74,.12);
  --card-bg:   rgba(255,252,245,.6);
  --card-border:rgba(30,20,5,.12);
  --related-bg: rgba(255,252,245,.75);
  --related-border: rgba(30,20,5,.15);
  --related-txt: rgba(30,20,5,.65);
  --related-kw:  #7a6020;
  --dialog-bg:  #1a1208;
  --dialog-text:#f5f0e8;
  --dialog-sub: #c8b87a;
  --dialog-cancel-bg: #2e2010;
  --dialog-cancel-c:  #e8e0c8;
  --toggle-icon: 🌙;
}

/* ── 바둑판 배경 ──────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body {
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color: var(--ui-text);
  transition: background .4s, color .3s;
  position: relative;
  overflow-x: hidden;
}

/* 바둑판 선 배경 — 상하좌우 1cm 여백 안에만 그려짐 */
body::before {
  content:'';
  position:fixed;
  inset: var(--margin);          /* 상하좌우 1cm 공백 */
  background-color: transparent;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: var(--cell-w) var(--cell-h);
  background-position: 0px 0px;
  z-index:0;
  transition: background .4s;
  border: 0.5px solid var(--line); /* 바둑판 외곽선 */
}

/* 배경 바탕색은 body 자체에 */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background-color: var(--bg);
  z-index:-1;
  transition: background .4s;
}

/* 바둑알 캔버스 — 격자 영역 안에만 */
#stone-canvas {
  position:fixed;
  inset: var(--margin);
  pointer-events:none;
  z-index:1;
}

/* 콘텐츠는 z-index:2 위에 */
.app { position:relative; z-index:2; max-width:700px; margin:0 auto; padding:2rem 1.5rem; }

/* ── 로딩 / 로그인 ────────────────────────── */
.loading{display:flex;align-items:center;justify-content:center;min-height:80vh;font-size:14px;color:var(--ui-sub)}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1.5rem}
.login-logo{font-size:48px;margin-bottom:.25rem;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.login-title{font-size:22px;font-weight:600;color:var(--ui-text);letter-spacing:.02em}
.login-sub{font-size:13px;color:var(--ui-sub);text-align:center;line-height:1.7}
.google-btn{display:flex;align-items:center;gap:.75rem;background:var(--btn-bg);color:var(--btn-icon);border:none;border-radius:50px;padding:.75rem 1.75rem;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit;box-shadow:0 4px 20px var(--stone-sh)}
.google-btn:hover{opacity:.88;transform:scale(1.03)}
.google-btn img{width:20px;height:20px}
.login-err{font-size:13px;color:#e24b4a;display:none}

/* ── 앱 헤더 ──────────────────────────────── */
.app-header{
  align-items:center;justify-content:space-between;
  margin-bottom:1.5rem;gap:.5rem;
  flex-wrap:nowrap;
  min-width:0;
}
/* display는 pc-only / mobile-only 클래스가 제어 */
.header-left{flex-shrink:0;min-width:0;}
.date-label{
  font-size:10px;color:var(--ui-muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.15rem;
  text-shadow: 0 0 12px var(--bg), 0 0 8px var(--bg), 0 2px 6px var(--bg);
  white-space:nowrap;
}
.date-text{
  font-size:20px;font-weight:600;color:var(--ui-text);letter-spacing:.01em;
  text-shadow: 0 0 16px var(--bg), 0 0 10px var(--bg), 0 2px 8px var(--bg), 0 0 24px var(--bg);
  white-space:nowrap;
}
.header-right{
  display:flex;align-items:center;gap:.4rem;
  flex-shrink:0;flex-wrap:nowrap;
}
.user-avatar{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--ui-border);object-fit:cover;box-shadow:0 2px 8px var(--stone-sh);flex-shrink:0;}
.user-name{font-size:12px;color:var(--ui-sub);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.theme-btn{background:none;border:0.5px solid var(--ui-border);border-radius:8px;padding:4px 7px;font-size:13px;cursor:pointer;line-height:1;transition:border-color .15s,transform .1s;color:var(--ui-text);flex-shrink:0;}
.theme-btn:hover{transform:scale(1.1)}
.logout-btn{background:none;border:0.5px solid var(--ui-border);border-radius:6px;color:var(--ui-sub);padding:4px 9px;font-size:11px;cursor:pointer;transition:color .12s,border-color .12s;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.logout-btn:hover{color:var(--ui-text);border-color:var(--ui-sub)}
.export-btn{background:none;border:0.5px solid var(--ui-border);border-radius:6px;color:var(--ui-sub);padding:4px 7px;font-size:13px;cursor:pointer;transition:color .12s,border-color .12s,transform .1s;line-height:1;display:flex;align-items:center;flex-shrink:0;}
.export-btn:hover{color:var(--ui-text);border-color:var(--ui-sub);transform:scale(1.08)}
.export-btn:active{transform:scale(.95)}

/* ── 메인 레이아웃 ────────────────────────── */
.main-row{display:flex;gap:1rem;align-items:flex-start;margin-bottom:1.5rem}
.side-col{display:flex;flex-direction:column;gap:.625rem;width:148px;flex-shrink:0}

/* ── 입력창 ───────────────────────────────── */
.compose{
  background:var(--compose-bg);
  border:0.5px solid var(--ui-border);
  border-radius:14px;
  padding:1rem 1.25rem;
  flex:1;min-width:0;
  backdrop-filter:blur(12px);
  box-shadow:0 4px 24px rgba(0,0,0,.18);
}
.compose-top{display:flex;gap:.875rem;align-items:flex-start}
textarea{
  flex:1;background:transparent;border:none;outline:none;resize:none;
  font-size:15px;color:var(--ui-text);font-family:inherit;line-height:1.75;min-height:80px;
}
textarea::placeholder{color:var(--ui-muted)}

/* 저장 버튼 — 바둑알 */
.save-stone{
  width:42px;height:42px;
  border-radius:50%;
  background: var(--btn-bg);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:transform .12s,opacity .12s;
  margin-top:2px;padding:0;
  box-shadow: 2px 3px 8px var(--stone-sh);
}
.save-stone:hover{transform:scale(1.08)}
.save-stone:active{transform:scale(.93)}
.save-stone:disabled{
  background: var(--btn-dis);
  box-shadow:none;cursor:not-allowed;
}
.save-stone:disabled i{color:var(--ui-muted)!important}
.save-stone i{font-size:17px;color:var(--btn-icon);line-height:1}

.compose-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.625rem;padding-top:.625rem;border-top:0.5px solid var(--ui-border)}
.mic-btn{background:none;border:none;cursor:pointer;color:var(--ui-sub);padding:2px 5px;border-radius:6px;font-size:16px;line-height:1;transition:color .12s,background .12s;display:flex;align-items:center}
.mic-btn:hover{color:var(--ui-text);background:var(--ui-muted)}
.mic-btn.recording{color:#e24b4a;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.char-count{font-size:10px;color:var(--ui-muted)}

/* ── 미니 달력 ────────────────────────────── */
.mini-cal{
  background:var(--compose-bg);
  border:0.5px solid var(--ui-border);
  border-radius:10px;
  padding:.5rem .6rem;
  backdrop-filter:blur(10px);
  box-shadow:0 2px 12px rgba(0,0,0,.15);
}
.mcal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.35rem}
.mcal-title{font-size:10px;font-weight:600;color:var(--ui-text)}
.mcal-nav{background:none;border:none;cursor:pointer;color:var(--ui-muted);padding:1px 3px;border-radius:4px;transition:color .12s;font-size:12px;line-height:1}
.mcal-nav:hover{color:var(--ui-text)}
.mcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mcal-dow{font-size:8px;color:var(--ui-muted);text-align:center;padding:2px 0;font-weight:500}
.mcal-day{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:9px;color:var(--ui-muted);cursor:default;transition:all .1s;
}
/* 메모 있는 날 = 바둑알 */
.mcal-day.active{
  background: var(--btn-bg);
  color:var(--btn-icon);cursor:pointer;font-weight:600;font-size:8px;
  box-shadow:1px 2px 4px var(--stone-sh);
}
.mcal-day.active:hover{transform:scale(1.15)}
.mcal-day.today{color:var(--ui-sub);outline:1px solid var(--ui-muted);outline-offset:-1px}
.mcal-day.today.active{outline-color:transparent}
.mcal-day.selected{
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.3), #c8a84b 55%, #8a6820);
  color:#fff;box-shadow:1px 2px 6px rgba(0,0,0,.4);
}
.mcal-day.empty{pointer-events:none}

/* ── 연관 기록 패널 — 가로 스크롤 ─────────── */
.related-panel{
  background:var(--related-bg);
  border:0.5px solid var(--related-border);
  border-radius:10px;
  padding:.5rem .75rem;
  margin-bottom:1.25rem;
  backdrop-filter:blur(10px);
  animation:fadeIn .2s ease;
}
.related-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem}
.related-title{font-size:10px;color:var(--related-kw);font-weight:600;display:flex;align-items:center;gap:.3rem;letter-spacing:.03em}
.related-title i{font-size:12px}
.related-close{background:none;border:none;cursor:pointer;color:var(--ui-muted);font-size:13px;padding:1px 3px;border-radius:3px;line-height:1;transition:color .12s}
.related-close:hover{color:var(--ui-text)}
/* 카드들을 오른쪽 정렬로, 왼쪽 방향으로 쌓이게 */
.related-list{
  display:flex;
  flex-direction:row-reverse;   /* 새 카드가 오른쪽 기준, 이전 카드는 왼쪽으로 밀림 */
  justify-content:flex-start;
  gap:.5rem;
  overflow-x:auto;
  padding-bottom:.25rem;
  scrollbar-width:none;
}
.related-list::-webkit-scrollbar{display:none}
.related-card{
  background:var(--card-bg);border:0.5px solid var(--card-border);
  border-radius:8px;padding:.5rem .7rem;cursor:pointer;
  transition:border-color .12s,transform .1s;
  flex-shrink:0;
  width:140px;
  animation:slideInRight .2s ease;
}
@keyframes slideInRight{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.related-card:hover{border-color:var(--related-kw);transform:translateY(-2px)}
.related-card-text{font-size:11px;color:var(--related-txt);line-height:1.5;word-break:break-word;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.related-card-meta{font-size:10px;color:var(--ui-muted);margin-top:.3rem}
.related-card-keywords{font-size:9px;color:var(--related-kw);margin-top:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── 메모 패널 (날짜별) ───────────────────── */
.memo-panel-title{font-size:11px;color:var(--ui-sub);margin-bottom:.625rem;letter-spacing:.04em}
.memo-list{display:flex;flex-direction:column;gap:.5rem}
.memo-card{
  background:var(--card-bg);
  border:0.5px solid var(--card-border);
  border-radius:12px;padding:.75rem 1rem;
  display:flex;align-items:flex-start;gap:.75rem;
  animation:fadeIn .18s ease;
  backdrop-filter:blur(8px);
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.memo-card:hover{border-color:var(--ui-sub)}
.memo-content{flex:1;min-width:0}
.memo-text{font-size:13px;color:var(--ui-text);line-height:1.65;word-break:break-word;white-space:pre-wrap}
.memo-time{font-size:11px;color:var(--ui-muted);margin-top:.3rem}
.del-btn{background:none;border:none;cursor:pointer;color:var(--ui-muted);padding:2px 4px;border-radius:4px;transition:color .12s,background .12s;flex-shrink:0;font-size:15px}
.del-btn:hover{color:#e24b4a;background:var(--del-hover)}
.empty-day{font-size:13px;color:var(--ui-muted);padding:.75rem 0;text-align:center}

/* ── 삭제 다이얼로그 ──────────────────────── */
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s ease;backdrop-filter:blur(4px)}
.dialog-box{background:var(--dialog-bg);border-radius:16px;padding:1.75rem 2rem;max-width:300px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.dialog-msg{font-size:15px;color:var(--dialog-text);margin-bottom:1.25rem;line-height:1.6;font-weight:500}
.dialog-btns{display:flex;gap:.75rem;justify-content:center}
.dialog-btn{padding:9px 26px;border-radius:50px;font-size:14px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:opacity .12s,transform .1s}
.dialog-btn:active{transform:scale(.96)}
.dialog-btn.cancel{background:var(--dialog-cancel-bg);color:var(--dialog-cancel-c)}
.dialog-btn.cancel:hover{opacity:.8}
.dialog-btn.confirm{background:#e24b4a;color:#fff}
.dialog-btn.confirm:hover{opacity:.85}

/* ── 토스트 알림 ──────────────────────────── */
.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--dialog-bg);color:var(--dialog-text);
  padding:.75rem 1.5rem;border-radius:50px;font-size:13px;font-weight:500;
  box-shadow:0 8px 32px rgba(0,0,0,.35);
  opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:2000;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 검색 버튼 ────────────────────────────── */
.search-btn{
  background:none;border:0.5px solid var(--ui-border);border-radius:6px;
  color:var(--ui-sub);padding:4px 8px;font-size:14px;cursor:pointer;
  transition:color .12s,border-color .12s,transform .1s;
  line-height:1;display:flex;align-items:center;
}
.search-btn:hover{color:var(--ui-text);border-color:var(--ui-sub);transform:scale(1.08)}
.search-btn.active{color:var(--related-kw);border-color:var(--related-kw)}

/* ── 검색 오버레이 ────────────────────────── */
.search-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:500;display:flex;align-items:flex-start;justify-content:center;
  padding-top:5rem;backdrop-filter:blur(4px);
  animation:fadeIn .15s ease;
}
.search-modal{
  background:var(--dialog-bg);border-radius:14px;
  width:min(560px, 90vw);
  box-shadow:0 16px 48px rgba(0,0,0,.4);
  overflow:hidden;
}
.search-modal-row{
  display:flex;align-items:center;gap:.75rem;
  padding:.875rem 1.125rem;
}
.search-input{
  flex:1;background:transparent;border:none;outline:none;
  font-size:16px;color:var(--dialog-text);font-family:inherit;
}
.search-input::placeholder{color:var(--dialog-sub)}
.search-close-btn{
  background:none;border:none;cursor:pointer;
  color:var(--dialog-sub);font-size:16px;padding:2px 4px;
  border-radius:4px;transition:color .12s;line-height:1;flex-shrink:0;
}
.search-close-btn:hover{color:var(--dialog-text)}

/* ── 검색 결과 패널 ───────────────────────── */
.search-panel{
  margin-bottom:1.25rem;
  animation:fadeIn .18s ease;
}
.search-panel-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:.625rem;
}
.search-result-label{font-size:11px;color:var(--ui-sub);letter-spacing:.04em}
.search-panel-close{
  background:none;border:none;cursor:pointer;color:var(--ui-muted);
  font-size:14px;padding:2px 4px;border-radius:4px;transition:color .12s;
}
.search-panel-close:hover{color:var(--ui-text)}
.search-result-list{display:flex;flex-direction:column;gap:.5rem}
.search-result-card{
  background:var(--card-bg);border:0.5px solid var(--card-border);
  border-radius:12px;padding:.75rem 1rem;
  display:flex;align-items:flex-start;gap:.75rem;
  cursor:pointer;transition:border-color .12s;
  animation:fadeIn .15s ease;
}
.search-result-card:hover{border-color:var(--related-kw)}
.search-result-content{flex:1;min-width:0}
.search-result-date{font-size:11px;color:var(--related-kw);margin-bottom:.25rem;font-weight:500}
.search-result-text{
  font-size:13px;color:var(--ui-text);line-height:1.65;
  word-break:break-word;white-space:pre-wrap;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.search-result-text mark{
  background:rgba(200,185,122,.35);color:inherit;
  border-radius:2px;padding:0 1px;font-style:normal;
}
.search-no-result{font-size:13px;color:var(--ui-muted);padding:.75rem 0;text-align:center}

/* 오버레이 내 미리보기 */
.search-preview{
  border-top:0.5px solid rgba(128,128,128,.2);
  padding:.5rem .75rem .75rem;
  max-height:280px;overflow-y:auto;
  scrollbar-width:none;
}
.search-preview::-webkit-scrollbar{display:none}
.search-preview-list{display:flex;flex-direction:column;gap:.375rem}
.search-preview-item{
  padding:.5rem .75rem;border-radius:8px;cursor:pointer;
  background:rgba(128,128,128,.08);
  transition:background .1s;
}
.search-preview-item:hover{background:rgba(128,128,128,.16)}
.search-preview-date{font-size:11px;color:var(--dialog-sub);margin-bottom:.2rem}
.search-preview-text{
  font-size:13px;color:var(--dialog-text);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.search-preview-text mark{
  background:rgba(200,185,122,.45);color:inherit;
  border-radius:2px;padding:0 1px;
}
.search-preview-enter{
  text-align:center;font-size:11px;
  color:var(--dialog-sub);margin-top:.625rem;
}
.search-preview-empty{

// ── 테마 ──────────────────────────────────

// ── 바둑알 캔버스 ─────────────────────────
var canvas = document.getElementById('stone-canvas');
var ctx = canvas.getContext('2d');
// 각 돌: { x, y, color:'black'|'white' }
var stonePositions = [];
var usedPoints = {}; // 이미 사용된 격자점

// 피보나치 수열 미리 생성 (최대 300번째까지)
var FIB = [1, 1];
for (var _f = 2; _f < 300; _f++) FIB.push(FIB[_f-1] + FIB[_f-2]);
// FIB[n] = n+1번째 피보나치 수
// memoCount가 FIB[k] 이상이면 k+1번째까지 돌을 놓음

function fibStoneCount(memoCount) {
  // memoCount에 해당하는 피보나치 달성 횟수 = 돌 수
  var count = 0;
  for (var i = 0; i < FIB.length; i++) {
    if (memoCount >= FIB[i]) count = i + 1;
    else break;
  }
  return Math.min(count, 150);
}

function getMarginPx() {
  // 모바일(600px 이하): 0.4cm ≈ 15px, PC: 1cm ≈ 37.8px
  return window.innerWidth <= 600 ? 15 : Math.round(37.8);
}

function resizeCanvas() {
  var margin = getMarginPx();
  canvas.width  = window.innerWidth  - margin * 2;
  canvas.height = window.innerHeight - margin * 2;
  drawStones();
}

var GRID_W = 40;
var GRID_H = 42.8;

function getGridSize() {
  if (window.innerWidth <= 600) return { w: 22, h: 23.5 };
  return { w: GRID_W, h: GRID_H };
}

function getStoneR() {
  var g = getGridSize();
  return Math.round((g.w * 0.97) / 2);
}

// ── 결정론적 시드 난수 (LCG) ─────────────
// 같은 시드 → 항상 같은 순서의 난수 → 고정 배치
function SeededRandom(seed) {
  this.s = seed >>> 0;
}
SeededRandom.prototype.next = function() {
  this.s = (Math.imul(1664525, this.s) + 1013904223) >>> 0;
  return this.s / 4294967296;
};

// ── 격자점 목록 생성 (돌 반지름 여백 포함) ─
function getGridPoints() {
  var g = getGridSize();
  var r = getStoneR();
  var pts = [];
  var W = canvas.width;
  var H = canvas.height;
  var startX = r;
  var startY = r;
  var c = 0;
  while (startX + c * g.w <= W - r) {
    var row = 0;
    while (startY + row * g.h <= H - r) {
      pts.push({
        x: Math.round(startX + c * g.w),
        y: Math.round(startY + row * g.h)
      });
      row++;
    }
    c++;
  }
  return pts;
}

// 시드 기반 셔플 (Fisher-Yates)
function seededShuffle(arr, rng) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(rng.next() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function ptKey(p) { return p.x + ',' + p.y; }

function drawOneStone(x, y, r, isWhite) {
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,' + (isWhite ? '.45' : '.6') + ')';
  ctx.shadowBlur = r * 1.1;
  ctx.shadowOffsetX = r * 0.25;
  ctx.shadowOffsetY = r * 0.45;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = isWhite ? '#f0ede8' : '#1a1208';
  ctx.fill();
  if (isWhite) {
    ctx.strokeStyle = 'rgba(0,0,0,.15)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  ctx.restore();
}

function drawStones() {
  if (!canvas) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  var r = getStoneR();
  for (var i = 0; i < stonePositions.length; i++) {
    var p = stonePositions[i];
    drawOneStone(p.x, p.y, r, p.white);
  }
}

// ── 착수 소리 (Web Audio API) ─────────────
var audioCtx = null;
function playStoneSound(isWhite) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var bufLen = audioCtx.sampleRate * 0.08;
    var buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < bufLen; i++) {
      var env = Math.exp(-i / (audioCtx.sampleRate * 0.012));
      data[i] = (Math.random() * 2 - 1) * env;
    }
    var src = audioCtx.createBufferSource();
    src.buffer = buf;
    var filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = isWhite ? 2800 : 1800;
    filter.Q.value = 0.8;
    var gain = audioCtx.createGain();
    gain.gain.value = 0.55;
    src.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    src.start();
  } catch(e) {}
}

// 시드 고정(42) → 새로고침/리사이즈해도 항상 같은 배치
var FIXED_SEED = 42;

function buildAllStones(targetCount) {
  var pts = getGridPoints();
  var rng = new SeededRandom(FIXED_SEED);
  var shuffled = seededShuffle(pts, rng);

  stonePositions = [];
  usedPoints = {};
  var blackCount = 0, whiteCount = 0;

  for (var i = 0; i < shuffled.length && stonePositions.length < targetCount; i++) {
    var k = ptKey(shuffled[i]);
    if (usedPoints[k]) continue;
    usedPoints[k] = true;

    // 흑백 비율도 시드 난수로 결정 → 항상 동일한 색 배치
    var isWhite;
    if (blackCount === whiteCount) {
      isWhite = rng.next() < 0.5;
    } else if (blackCount > whiteCount) {
      isWhite = rng.next() < 0.65;
    } else {
      isWhite = rng.next() < 0.35;
    }
    if (isWhite) whiteCount++; else blackCount++;
    stonePositions.push({ x: shuffled[i].x, y: shuffled[i].y, white: isWhite });
  }

// 전체 돌 재생성 (리사이즈 등)
function rebuildStones(targetCount) {
  buildAllStones(targetCount);
}

// 메모 수 변화 시 호출
var lastStoneCount = 0;
function updateStones(memoCount, playSound) {
  var target = fibStoneCount(memoCount);
  if (target === lastStoneCount) { drawStones(); return; }

  // 항상 처음부터 고정 순서로 target개까지 재생성
  buildAllStones(target);
  lastStoneCount = target;
  drawStones();

  if (playSound && target > lastStoneCount - 1 && target > 0) {
    var newest = stonePositions[stonePositions.length - 1];
    if (newest) playStoneSound(newest.white);

// 가로(width) 변화만 실제 리사이즈로 처리
var lastCanvasWidth = 0;
var resizeTimer = null;

window.addEventListener('resize', function() {
  var margin = getMarginPx();
  var newWidth = window.innerWidth - margin * 2;

  // 가로 폭이 바뀐 경우만 재배치 (모바일 스크롤로 인한 세로 변화 무시)
  if (Math.abs(newWidth - lastCanvasWidth) < 2) {
    // 가로 변화 없음 → 캔버스 높이만 조용히 업데이트, 돌 재배치 안 함

    var m = getMarginPx();

    canvas.height = window.innerHeight - m * 2;

var SW = '이 그 저 것 수 을 를 가 은 는 에 의 로 으로 와 과 도 만 에서 까지 부터 에게 처럼 같이 보다 이다 있다 없다 하다 되다 그리고 하지만 그러나 또한 그래서 따라서 및 등 들 습니다 합니다 했다 한다 할 하는 된 위해 통해 대한 있는 없는 같은 다른 더 가장 매우 정말 너무 아주 많이 모든 각 여러 한 두 세 오늘 어제 내일 지금 때 일 년 월 시 분 이번 다음 지난 제가 저는 나는 내가 우리 아직 이제 거의 조금 아마 왜 어떻게 무엇 언제 어디'.split(' ');
var STOP = {};
for (var si = 0; si < SW.length; si++) STOP[SW[si]] = true;

function getWords(text) {
  var raw = text.replace(/[^\uAC00-\uD7A3a-zA-Z0-9\s]/g, ' ').split(/\s+/);
  var result = []; var seen = {};
  for (var i = 0; i < raw.length; i++) {
    var w = raw[i].trim();
    if (w.length >= 2 && !STOP[w] && !seen[w]) { seen[w]=true; result.push(w); }
  }
  return result;
}

function findSimilar(newText, memoList) {
  var newWords = getWords(newText);
  if (newWords.length === 0) return [];
  var newSet = {};
  for (var i = 0; i < newWords.length; i++) newSet[newWords[i]] = true;
  var results = [];
  for (var j = 0; j < memoList.length; j++) {
    var memo = memoList[j];
    var memoWords = getWords(memo.text);
    var matched = [];
    for (var k = 0; k < memoWords.length; k++) {
      if (newSet[memoWords[k]]) matched.push(memoWords[k]);
    }
    if (matched.length >= 2) results.push({ memo: memo, matched: matched });
  }
  results.sort(function(a,b){ return b.matched.length - a.matched.length; });
  return results.slice(0, 5);
}

function showRelatedPanel(results) {
  var panel = document.getElementById('related-panel');
  var list = document.getElementById('related-list');
  if (!results || results.length === 0) { panel.style.display='none'; return; }

    var dt = new Date(memo.ts);
    var dateStr = (dt.getMonth()+1)+'월 '+dt.getDate()+'일';
    var hh = String(dt.getHours()).padStart(2,'0');

    var card = document.createElement('div'); card.className='related-card';
    var tEl = document.createElement('div'); tEl.className='related-card-text'; tEl.textContent=preview;
    var mEl = document.createElement('div'); mEl.className='related-card-meta'; mEl.textContent=dateStr+' '+hh+':'+mm;
    var kEl = document.createElement('div'); kEl.className='related-card-keywords'; kEl.textContent='# '+matched.slice(0,4).join('  # ');
    card.appendChild(tEl); card.appendChild(mEl); card.appendChild(kEl);

      var k=dateKey(d); viewYear=d.getFullYear(); viewMonth=d.getMonth();
      renderCal(); selectDay(k,day); window.scrollTo({top:0,behavior:'smooth'});
    }); })(dt, dt.getDate());
    list.appendChild(card);

}

var justSaved = 0;   // 저장 직후 onSnapshot 재실행 카운터
var isFirstLoad = true; // 로그인 후 첫 번째 snapshot 여부

function subscribeToMemos(uid) {
  if (unsubscribe) unsubscribe();
  isFirstLoad = true;
  var q = query(collection(db,'memos'), where('uid','==',uid));
  unsubscribe = onSnapshot(q, function(snapshot){
    allMemos = snapshot.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
    updateStones(allMemos.length, false);
    renderCal();

    // ── 로그인 직후 첫 로드: 오늘 메모 자동 팝업 ──
    if (isFirstLoad) {
      isFirstLoad = false;
      var todayStart = new Date();
      todayStart.setHours(0,0,0,0);
      var todayMemos = allMemos.filter(function(m){
        return m.ts >= todayStart.getTime();
      });
      if (todayMemos.length > 0) {
        // 오늘 날짜 패널 자동 열기
        viewYear = todayObj.getFullYear();
        viewMonth = todayObj.getMonth();
        renderCal();
        selectDay(todayKey, todayObj.getDate());
        showToast('오늘 저장된 메모 ' + todayMemos.length + '개가 있어요 📝', 3000);
      }
      return;
    }

    if (justSaved > 0) {
      justSaved--;
      return;
    }
    if (selectedKey){
      var still=allMemos.some(function(m){ return dateKey(new Date(m.ts))===selectedKey; });
      if (still) selectDay(selectedKey,parseInt(selectedKey.split('-')[2]));
      else { document.getElementById('memo-panel').style.display='none'; selectedKey=null; }
    }
  }, function(err){ console.error('Firestore 오류:',err); });
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlightText(text, query) {
  var re = new RegExp('(' + escapeRegex(query) + ')', 'gi');
  var div = document.createElement('div');
  div.className = 'search-result-text';
  // 하이라이트를 위해 파트로 분리
  var parts = text.split(re);
  for (var i = 0; i < parts.length; i++) {
    if (re.test(parts[i])) {
      var mark = document.createElement('mark');
      mark.textContent = parts[i];
      div.appendChild(mark);
    } else {
      div.appendChild(document.createTextNode(parts[i]));
    }
    re.lastIndex = 0;
  }
  return div;
}

function runSearch(query) {
  var panel = document.getElementById('search-panel');
  var list  = document.getElementById('search-result-list');
  var label = document.getElementById('search-result-label');
  query = query.trim();

  if (!query) {
    panel.style.display = 'none';
    return;
  }

  var q = query.toLowerCase();
  var matched = allMemos.filter(function(m){
    return m.text.toLowerCase().indexOf(q) !== -1;
  }).sort(function(a,b){ return b.ts - a.ts; });

  list.innerHTML = '';

  if (matched.length === 0) {
    label.textContent = '"' + query + '" 검색 결과 없음';
    var empty = document.createElement('div');
    empty.className = 'search-no-result';
    empty.textContent = '일치하는 메모가 없어요';
    list.appendChild(empty);
  } else {
    label.textContent = '"' + query + '" 검색 결과 ' + matched.length + '개';
    matched.forEach(function(memo) {
      var dt = new Date(memo.ts);
      var dateStr = dt.getFullYear()+'년 '+(dt.getMonth()+1)+'월 '+dt.getDate()+'일';
      var hh = String(dt.getHours()).padStart(2,'0');
      var mm = String(dt.getMinutes()).padStart(2,'0');

      var card = document.createElement('div');
      card.className = 'search-result-card';

      var content = document.createElement('div');
      content.className = 'search-result-content';

      var dateEl = document.createElement('div');
      dateEl.className = 'search-result-date';
      dateEl.textContent = dateStr + ' ' + hh + ':' + mm;

      content.appendChild(dateEl);
      content.appendChild(highlightText(memo.text, query));
      card.appendChild(content);

      // 클릭 시 해당 날짜로 이동
      (function(d) {
        card.addEventListener('click', function() {
          var k = dateKey(d);
          viewYear = d.getFullYear();
          viewMonth = d.getMonth();
          renderCal();
          selectDay(k, d.getDate());
          // 검색 패널 닫기
          panel.style.display = 'none';
          document.getElementById('search-btn').classList.remove('active');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      })(dt);

      list.appendChild(card);
    });
  }

  panel.style.display = 'block';
}

document.getElementById('export-btn').addEventListener('click', function() {
  if (!allMemos || allMemos.length === 0) {
    alert('내보낼 메모가 없어요.');
    return;
  }

  // 날짜순(오래된 것부터) 정렬
  var sorted = allMemos.slice().sort(function(a, b) { return a.ts - b.ts; });

  var lines = [];
  lines.push('■ 메모 전체 내보내기');
  lines.push('내보낸 날짜: ' + formatFull(new Date()));
  lines.push('총 메모 수: ' + sorted.length + '개');
  lines.push('');
  lines.push('═'.repeat(40));
  lines.push('');

  var prevDateStr = '';
  for (var i = 0; i < sorted.length; i++) {
    var memo = sorted[i];
    var dt = new Date(memo.ts);
    var dateStr = formatDate(dt);
    var timeStr = formatTime(dt);

    // 날짜가 바뀌면 날짜 헤더 출력
    if (dateStr !== prevDateStr) {
      if (i > 0) lines.push('');
      lines.push('▶ ' + dateStr);
      lines.push('─'.repeat(30));
      prevDateStr = dateStr;
    }

    lines.push('[' + timeStr + ']');
    lines.push(memo.text);
    lines.push('');
  }

  lines.push('═'.repeat(40));

  var content = lines.join('\n');
  var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '메모_' + formatDateFile(new Date()) + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

function formatDate(dt) {
  var days = ['일','월','화','수','목','금','토'];
  return dt.getFullYear() + '년 ' + (dt.getMonth()+1) + '월 ' + dt.getDate() + '일 (' + days[dt.getDay()] + ')';
}
function formatTime(dt) {
  return String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0');
}
function formatFull(dt) {
  return formatDate(dt) + ' ' + formatTime(dt);
}
function formatDateFile(dt) {
  return dt.getFullYear() + String(dt.getMonth()+1).padStart(2,'0') + String(dt.getDate()).padStart(2,'0');
}

  var file = e.target.files[0];
  if (!file) return;
  if (!currentUser) { showToast('로그인 후 가져오기를 이용해 주세요.'); return; }

  var reader = new FileReader();
  reader.onload = function(ev) {
    var text = ev.target.result;
    var parsed = parseTxt(text);

    if (parsed.length === 0) {
      showToast('인식 가능한 메모를 찾지 못했어요.'); return;
    }

    // 업로드 확인
    if (!confirm('총 ' + parsed.length + '개의 메모를 가져올까요?\n기존 메모는 삭제되지 않고 추가돼요.')) return;

    uploadParsed(parsed);
  };
  reader.readAsText(file, 'utf-8');
});

// ── 파싱: 내보내기 형식 + 자유 형식 모두 지원 ──
function parseTxt(text) {
  var results = [];
  var lines = text.split(/\r?\n/);

  var currentDate = null;  // Date 객체
  var currentTime = null;  // { h, m }
  var contentLines = [];

  function flushMemo() {
    if (!currentDate || contentLines.length === 0) return;
    var body = contentLines.join('\n').trim();
    if (!body) return;
    // 날짜 + 시간 합쳐서 timestamp 만들기
    var d = new Date(currentDate.getTime());
    if (currentTime) { d.setHours(currentTime.h); d.setMinutes(currentTime.m); d.setSeconds(0); }
    else { d.setHours(9); d.setMinutes(0); d.setSeconds(0); }
    results.push({ text: body, ts: d.getTime() });
    contentLines = [];
    currentTime = null;
  }

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;

    // ── 날짜 헤더 패턴 감지 ──────────────────────
    // 예) "▶ 2026년 5월 24일 (일)"  /  "2026년 5월 24일"  /  "2026-05-24"  /  "2026/05/24"
    var dateMatch =
      line.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/) ||
      line.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);

    if (dateMatch) {
      flushMemo();
      currentDate = new Date(
        parseInt(dateMatch[1]),
        parseInt(dateMatch[2]) - 1,
        parseInt(dateMatch[3])
      );
      currentTime = null;
      continue;
    }

    // ── 시간 패턴 감지 ───────────────────────────
    // 예) "[09:15]"  /  "09:15"
    var timeMatch = line.match(/^\[?(\d{1,2}):(\d{2})\]?$/);
    if (timeMatch) {
      flushMemo();
      currentTime = { h: parseInt(timeMatch[1]), m: parseInt(timeMatch[2]) };
      continue;
    }

    // ── 구분선 / 헤더 행 무시 ────────────────────
    if (/^[═─=\-─]{5,}/.test(line)) continue;
    if (/^■/.test(line)) continue;
    if (/^(내보낸 날짜|총 메모 수):/.test(line)) continue;

    // ── 내용 행 ──────────────────────────────────
    if (currentDate) {
      contentLines.push(lines[i].trimEnd()); // 왼쪽 공백만 제거
    }
  }
  flushMemo(); // 마지막 메모 처리
  return results;
}

// ── Firestore 일괄 업로드 ─────────────────
function uploadParsed(parsed) {
  showToast('업로드 중... 0 / ' + parsed.length, 60000);
  var done = 0;
  var failed = 0;

  function next(idx) {
    if (idx >= parsed.length) {
      if (failed > 0) showToast('완료! ' + done + '개 추가, ' + failed + '개 실패', 4000);
      else showToast('✓ ' + done + '개 메모를 성공적으로 가져왔어요!', 3500);
      return;
    }
    var item = parsed[idx];
    addDoc(collection(db, 'memos'), { uid: currentUser.uid, text: item.text, ts: item.ts })
      .then(function() {
        done++;
        showToast('업로드 중... ' + done + ' / ' + parsed.length, 60000);
        next(idx + 1);
      })
      .catch(function(err) {
        console.error('업로드 실패:', err);
        failed++;
        next(idx + 1);
      });
  }
  next(0);
}

// ── 입력 UI (PC + 모바일 공통) ───────────────

  // 모바일

  if (sbm) sbm.disabled = (len === 0);
}

// ── 음성 입력 ─────────────────────────────
(function(){
  // PC용 마이크
  function setupMic(micBtnId, micIconId, memoInputId) {
    var micBtn=document.getElementById(micBtnId);
    var micIcon=document.getElementById(micIconId);
    var memoInput=document.getElementById(memoInputId);
    if (!micBtn) return;
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){micBtn.style.opacity='.3';micBtn.style.cursor='not-allowed';micBtn.title='Chrome 권장';return;}
    var recog=new SR(); recog.lang='ko-KR'; recog.continuous=true; recog.interimResults=true;
    var isRec=false; var baseText='';
    recog.onresult=function(e){
      var interim=''; var fin='';
      for(var i=e.resultIndex;i<e.results.length;i++){
        var t=e.results[i][0].transcript;
        if(e.results[i].isFinal)fin+=t; else interim+=t;
      }
      if(fin)baseText+=fin;
      memoInput.value=baseText+interim;
      // 모바일/PC 동기화
      if(memoInputId==='memo-input-m') document.getElementById('memo-input').value=memoInput.value;
      else document.getElementById('memo-input-m').value=memoInput.value;
      updateInputUI();
    };
    recog.onerror=function(){ stopRec(); };
    recog.onend=function(){ if(isRec){try{recog.start();}catch(e){}} };
    function startRec(){isRec=true;baseText=memoInput.value;micBtn.classList.add('recording');micIcon.className='ti ti-microphone-off';try{recog.start();}catch(e){}}
    function stopRec(){isRec=false;recog.stop();micBtn.classList.remove('recording');micIcon.className='ti ti-microphone';memoInput.value=baseText;updateInputUI();}
    micBtn.addEventListener('click',function(){ if(isRec)stopRec(); else startRec(); });
  }
  setupMic('mic-btn',   'mic-icon',   'memo-input');
  setupMic('mic-btn-m', 'mic-icon-m', 'memo-input-m');
})();
</script>
